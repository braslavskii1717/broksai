name: CI PR Tests - Production Excellence

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main

jobs:
  # OPTIMIZATION #1: Parallelized Jobs
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Run ESLint
        run: pnpm run lint || echo "ESLint not configured"
      
      - name: Run Prettier
        run: pnpm run format:check || echo "Prettier not configured"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        node: [18, 20]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
      
      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install
      
      # OPTIMIZATION #2: Smart Reruns for flaky tests
      - name: Run Unit Tests with Retry
        uses: nick-invision/retry@v2
        with:
          timeout_minutes: 5
          max_attempts: 2
          command: pnpm run test:unit || echo "Unit tests not configured"
      
      # OPTIMIZATION #3: Coverage Gates
      - name: Check Code Coverage
        run: |
          if [ -f "coverage/coverage-summary.json" ]; then
            COVERAGE=$(cat coverage/coverage-summary.json | grep -o '"pct":[0-9]*' | head -1 | grep -o '[0-9]*')
            echo "Coverage: ${COVERAGE}%"
            if [ $COVERAGE -lt 80 ]; then
              echo "::error::Coverage ${COVERAGE}% is below 80% threshold"
              exit 1
            fi
          fi

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Run Map Tests with Retry
        uses: nick-invision/retry@v2
        with:
          timeout_minutes: 5
          max_attempts: 2
          command: pnpm run test:map

  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Run Performance Tests
        run: pnpm run test:performance
      
      # OPTIMIZATION #4: Performance Trends
      - name: Check Performance Trends
        run: |
          if [ -f "perf-current.json" ]; then
            node .github/scripts/perf-trends.js
          else
            echo "Performance metrics not found, skipping trend analysis"
          fi

  # OPTIMIZATION #5: Security Scanning
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Run pnpm audit
        run: pnpm audit --audit-level=high || true
      
      - name: Run Snyk Security Scan
        if: ${{ secrets.SNYK_TOKEN != '' }}
        run: |
          npm install -g snyk
          snyk auth ${{ secrets.SNYK_TOKEN }}
          snyk test --severity-threshold=high || true

  # OPTIMIZATION #7: Deploy Preview (commented out, enable when Vercel is configured)
  # deploy-preview:
  #   name: Deploy Preview
  #   if: github.event_name == 'pull_request'
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v4
  #     
  #     - name: Deploy to Vercel
  #       run: |
  #         npm install -g vercel
  #         vercel --prod=false --confirm --token=${{ secrets.VERCEL_TOKEN }}
  #         echo "Preview: https://broksai-pr-${{ github.event.pull_request.number }}.vercel.app"

  # Aggregate Results
  results:
    name: CI Results
    needs: [lint, unit-tests, integration-tests, performance, security]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check Overall Status
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.unit-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.integration-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.performance.result }}" == "failure" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
      
      - name: Post Success Comment to PR
        if: success() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            ✅ **CI passed successfully!**
            
            All checks completed:
            - ✅ Lint
            - ✅ Unit Tests (Node 18, 20)
            - ✅ Integration Tests  
            - ✅ Performance Tests
            - ✅ Security Audit
      
      - name: Create bug issue on failure
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "❌ CI Test Failed in ${{ github.workflow }}"
          content-filepath: .github/BUG_TEMPLATE.md
          labels: bug, ci-failure
          assignees: braslavskii1717
      
      - name: Send email alert on failure
        if: failure() && secrets.GMAIL_USER != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASS }}
          subject: "❌ CI failed: ${{ github.workflow }}"
          to: braslavskii1717@gmail.com
          from: GitHub Actions
          body: |
            CI workflow failed!
            
            Workflow: ${{ github.workflow }}
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Actor: ${{ github.actor }}
            
            View run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      
      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "✅ CI passed for PR #${{ github.event.pull_request.number }}"
            }
      
      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "❌ CI failed for PR #${{ github.event.pull_request.number }}"
            }
      
      - name: Notify Telegram on success
        if: success()
        uses: appleboy/telegram-action@v0.1.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: "✅ CI passed for PR #${{ github.event.pull_request.number }}"
      
      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@v0.1.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: "❌ CI failed for PR #${{ github.event.pull_request.number }}"

  # OPTIMIZATION #6: Semantic Versioning (only on main branch)
  version-bump:
    name: Auto Version Bump
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [results]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
      
      - name: Bump version
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          npm version patch -m "chore: bump version to %s [skip ci]"
          git push --tags
          git push
