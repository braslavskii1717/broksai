name: Codex ↔ Perplexity Automation

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  codex-perplexity-integration:
    if: contains(github.event.issue.labels.*.name, 'codex-request')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: |
          npm install openai axios @octokit/rest
          
      - name: Run Codex ↔ Perplexity Integration
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPOSITORY: ${{ github.repository }}
        run: |
          node .github/scripts/codex-perplexity-integration.js
          
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: '🤖 Codex Generated Code for Issue #${{ github.event.issue.number }}'
          title: '🤖 Codex Generated Code for Issue #${{ github.event.issue.number }}'
          body: |
            ## 🤖 Automated Code Generation
            
            This PR was automatically generated by the Codex ↔ Perplexity automation system.
            
            **Source Issue:** #${{ github.event.issue.number }}
            **Generated by:** Codex SDK
            **Validated by:** Perplexity AI
            
            ### 📋 Summary
            ${{ github.event.issue.title }}
            
            ### ✅ Validation Results
            See comments below for detailed validation report.
            
            ---
            _This PR was created automatically. Review the code carefully before merging._
          branch: codex-${{ github.event.issue.number }}
          delete-branch: false
          labels: |
            automated
            codex-generated
